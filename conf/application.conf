# This is the main configuration file for the application.
# ~~~~~

include "backend.conf"

appName=ras-api

# Session configuration
# ~~~~~
application.session.httpOnly=false

application.session.secure=false

# The application languages
# ~~~~~
play.i18n.langs=["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router=prod.Routes

play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"
play.modules.enabled += "uk.gov.hmrc.rasapi.config.DataCleansingModule"

play.http.errorHandler = "uk.gov.hmrc.rasapi.config.RasErrorHandler"

# Uncomment below lines when previewing application.yaml file locally in case of CORS errors
# play.filters.enabled += "play.filters.cors.CORSFilter"
# play.filters.cors {
#   allowedOrigins = ["http://localhost:9680"]
# }

# Controller
# ~~~~~
# By default all controllers will have authorisation, logging and
# auditing (transaction monitoring) enabled.
# The below controllers are the default exceptions to this rule.

controllers {
    # 300 is the default, you may need to change this according to your needs
    confidenceLevel = 300

    com.kenshoo.play.metrics.MetricsController = {
      needsLogging = false
      needsAuditing = false
    }

  uk.gov.hmrc.rasapi.controllers.lookupController.LookupController = {
      needsLogging = false
      needsAuditing = true
    }
    uk.gov.hmrc.rasapi.controllers.documentation.Documentation = {
        needsLogging = false
        needsAuditing = false
    }
    uk.gov.hmrc.rasapi.controllers.fileController.FileController = {
        needsLogging = false
        needsAuditing = false
    }
    uk.gov.hmrc.rasapi.controllers.fileProcessing.FileProcessingController = {
        needsLogging = false
        needsAuditing = false
    }
}

# Evolutions
# ~~~~~
# You can disable evolutions if needed
# evolutionplugin=disabled

# Logger
# ~~~~~
# You can also configure logback (http://logback.qos.ch/), by providing a logger.xml file in the conf directory .

# Root logger:
logger.root=ERROR

# Logger used by the framework:
logger.play=INFO

# Logger provided to your application:
logger.application=DEBUG

# Metrics plugin settings - graphite reporting is configured on a per env basis
metrics {
    enabled = true
}

api {
    context = "individuals/relief-at-source"
    status="BETA"
    endpointsEnabled=true
    versions {
        v1_0.status = "RETIRED"
        v2_0.status = "BETA"
              }
}


# Microservice specific config

mongodb {
    uri = "mongodb://localhost:27017/ras-api"
    fileSessionsCacheTTLDays = 4.days # how long file session with download link should be stored (processing can take up to 1 day, plus 3 days time to download processed file, ras-api collection)
}

microservice {
    services {
        auth {
            host=localhost
            port=8500
        }

        datastream {
            host = localhost
            port = 8100
        }

        des {
            host = localhost
            port = 9670
            Environment = environment
            authorization = key
        }
    }
}

desauthtoken = K1gbAD4vVreR0yoJmdd9bUp5RXwByLXfh
environment = local
results.expiry.time = 3600
request-retry-limit = 3
retry-delay = 700
toggle-feature{
    allow-no-next-year-status = false
    allow-default-ruk = true
    retry-enabled = false
    bulk-retry-enabled = false
}

status {
    deceased = "DECEASED"
    do-not-re-process = "DO_NOT_RE_PROCESS"
    too-many-requests= "TOO_MANY_REQUESTS"
    matching-failed{
        api = "STATUS_UNAVAILABLE"
        csv = "cannot_provide_status"
    }

    internal-server-error{
        api = "INTERNAL_SERVER_ERROR"
        csv = "problem-getting-status"
    }
    service-unavailable = "SERVICE_UNAVAILABLE"
}
remove-chunks-data-exercise.enabled = true
api-v2_0.enabled = true
